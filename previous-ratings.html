<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Previous Ratings — SAM Goals</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-page">

<div class="card card--dashboard" role="main">
  <div class="dashboard-sticky-header">
    <div class="dashboard-header">
      <div class="brandblock">
        <svg class="seal" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-label="LBD Nation seal">
          <circle cx="32" cy="32" r="30.5" stroke="#B8933E" stroke-width="1.2" fill="none"/>
          <circle cx="32" cy="32" r="25" stroke="#B8933E" stroke-width="0.6" opacity="0.6" fill="none"/>
          <defs>
            <clipPath id="logoClip">
              <circle cx="32" cy="32" r="21"/>
            </clipPath>
          </defs>
          <image
            href="bck.png"
            x="11"
            y="11"
            width="42"
            height="42"
            clip-path="url(#logoClip)"
            preserveAspectRatio="xMidYMid slice"
          />
        </svg>

        <div class="wordmark">
          <span class="eyebrow">Living by Design Nation</span>
          <span class="title">Jury Dashboard</span>
          <span class="subtitle">PREVIOUS RATINGS</span>
          <span class="dashboard-welcome" id="dashboard-welcome"></span>
        </div>
      </div>
      <div class="dashboard-controls">
        <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme">🌓 Auto</button>
      </div>
    </div>

    <hr class="rule">
  </div>

  <div class="dashboard-content">

    <!-- LEVEL 1: every rating session this juror has submitted, each
         one showing its own organ/section breakdown directly - no
         intermediate report-type picker, since there's only ever been
         one report type in practice. -->
    <div class="dash-view" id="sessions-view">
      <button type="button" class="btn-back" id="back-to-menu">← Back to Dashboard</button>
      <h2 class="dash-view-title" id="sessions-report-title">Your Rating Sessions</h2>
      <div class="submissions-list" id="sessions-list"></div>
    </div>

    <!-- LEVEL 2: one session's full set of rating blocks -->
    <div class="dash-view is-hidden" id="session-detail-view">
      <button type="button" class="btn-back" id="back-to-sessions">← Back to Sessions</button>
      <div class="detail-header" id="session-detail-header"></div>
      <div id="session-detail-blocks"></div>
    </div>

  </div>
</div>

<!-- View a linked SAM Goal submission's full Q&A — reuses the same
     getSubmissionDetail action the dashboard drill-down and the rating
     form's own "View" button both already call -->
<div class="modal-overlay is-hidden" id="ref-view-modal">
  <div class="modal-card">
    <div class="modal-scroll">
      <div class="detail-header" id="ref-view-header"></div>
      <div class="qa-list" id="ref-view-qa-list"></div>
    </div>
    <div class="modal-actions">
      <button type="button" class="btn btn-secondary" id="ref-view-close-btn">Close</button>
    </div>
  </div>
</div>

<script src="common.js"></script>
<script src="js-previous-ratings.js"></script>
</body>
</html>
