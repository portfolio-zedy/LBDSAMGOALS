<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Questionnaire — SAM Goals</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card card--form" role="main" aria-label="LBD Monthly Questionnaire">

  <div class="card-header">
    <div class="brandblock">
      <svg class="seal" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-label="LBD Nation seal">
        <circle cx="32" cy="32" r="30.5" stroke="#B8933E" stroke-width="1.2" fill="none"/>
        <circle cx="32" cy="32" r="25" stroke="#B8933E" stroke-width="0.6" opacity="0.6" fill="none"/>
        <defs>
          <clipPath id="logoClip">
            <circle cx="32" cy="32" r="21"/>
          </clipPath>
        </defs>
        <image
          href="bck.png"
          x="11"
          y="11"
          width="42"
          height="42"
          clip-path="url(#logoClip)"
          preserveAspectRatio="xMidYMid slice"
        />
      </svg>

      <div class="wordmark">
        <span class="eyebrow">Living by Design Nation</span>
        <span class="title" id="organ-label">LOADING…</span>
        <span class="subtitle">MONTHLY REPORT</span>
      </div>
    </div>

    <div class="liveclock">
      <div class="date" id="liveDate">—</div>
      <div class="time"><span class="dot" aria-hidden="true"></span><span id="liveTime">--:--:--</span></div>
      <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme">🌓 Auto</button>
    </div>
  </div>

  <hr class="rule">

  <div class="submitter-name" id="submitter-name"></div>

  <div class="progress-wrap" aria-hidden="true">
    <div class="progress-bar" id="progress-bar"></div>
  </div>

  <form id="questionnaire-form" novalidate>
    <div id="dynamic-form-fields" class="fields-grid">
      <div class="loader-wrap">
        <div class="loader">
          <div class="loader-logo-wrap"><img src="bck.png" alt="Loading LBD seal"></div>
        </div>
        <div class="loader-caption">Fetching your questions…</div>
      </div>
    </div>

    <div class="actions">
      <div class="action-container">
        <button type="submit" class="btn btn-primary" id="submit-btn" disabled>Submit Report</button>
      </div>
      <div class="action-container">
        <button type="button" class="btn btn-secondary" onclick="window.location.href='index.html'">Cancel</button>
      </div>
    </div>
  </form>

  <div class="footnote">SAM Goals · Nation's Impact &amp; Performance Overview</div>
</div>

<!-- Results modal: shown after a successful submit, lets the person
     download their own answers as a PDF or JPEG -->
<div class="modal-overlay is-hidden" id="results-modal" role="dialog" aria-modal="true" aria-label="Submission summary">
  <div class="modal-card">
    <div class="modal-scroll" id="summary-container"></div>
    <div class="modal-actions">
      <button type="button" class="btn btn-secondary" id="modal-close-btn">Done</button>
    </div>
  </div>
</div>

<script src="common.js"></script>
<script src="js-questionnaire.js"></script>
</body>
</html>
