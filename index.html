<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LBD SAM Goals </title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card" role="main" aria-label="LBD Nation Jury Access">

  <div class="card-header">
    <div class="brandblock">
      <svg class="seal" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-label="LBD Nation seal">
        <circle cx="32" cy="32" r="30.5" stroke="#B8933E" stroke-width="1.2" fill="none"/>
        <circle cx="32" cy="32" r="25" stroke="#B8933E" stroke-width="0.6" opacity="0.6" fill="none"/>
        <defs>
          <clipPath id="logoClip">
            <circle cx="32" cy="32" r="21"/>
          </clipPath>
        </defs>
        <image
          href="bck.png"
          x="11"
          y="11"
          width="42"
          height="42"
          clip-path="url(#logoClip)"
          preserveAspectRatio="xMidYMid slice"
        />
      </svg>

      <div class="wordmark">
        <span class="eyebrow">Living by Design Nation</span>
        <span class="title">LBD SAM Goals</span>
        <span class="subtitle">MONTHLY FORM</span>
      </div>
    </div>

    <div class="liveclock">
      <div class="date" id="liveDate">—</div>
      <div class="time"><span class="dot" aria-hidden="true"></span><span id="liveTime">--:--:--</span></div>
      <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme">🌓 Auto</button>
    </div>
  </div>

  <hr class="rule">

  <form id="jury-form" novalidate>

    <div class="loader-wrap" id="organ-loader">
      <div class="loader">
        <div class="loader-logo-wrap"><img src="bck.png" alt="Loading LBD seal"></div>
      </div>
      <div class="loader-caption">Fetching organs from the registry…</div>
    </div>

    <div class="field is-hidden" id="organ-field">
      <label for="organ-select">Organ</label>
      <div class="select-wrap">
        <select id="organ-select" required disabled>
          <option value="" selected>Please select your organ</option>
        </select>
      </div>
      <div class="field-hint" id="organ-hint"></div>
    </div>

    <div class="field is-hidden" id="organ-option-field">
      <label for="organ-option-select" id="organ-option-label">Section</label>
      <div class="select-wrap">
        <select id="organ-option-select" required>
          <option value="" selected>Please select an option</option>
        </select>
      </div>
    </div>

    <div class="field is-hidden" id="name-field">
      <label for="user-name">Your Name</label>
      <input type="text" id="user-name" name="user-name" placeholder="Enter your full name" required>
      <div class="field-hint" id="name-hint"></div>
    </div>

    <div class="field-hint" id="availability-hint"></div>

    <div class="actions">
      <div class="action-container">
        <button type="submit" class="btn btn-primary" id="start-btn" disabled>Start Questionnaire</button>
      </div>
      <div class="action-container">
        <button type="button" class="btn btn-secondary" id="jury-login-btn">Jury Login</button>
      </div>
    </div>
  </form>

  <div class="footnote">SAM Goals · Nation's Impact &amp; Performance Overview</div>
</div>

<script src="common.js"></script>
<script src="jsmain.js"></script>

</body>
</html>
