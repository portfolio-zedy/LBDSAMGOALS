<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jury Dashboard — SAM Goals</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Lexend:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body class="dashboard-page">

<div class="card card--dashboard" role="main">
  <div class="dashboard-sticky-header">
    <div class="dashboard-header">
      <div class="brandblock">
        <svg class="seal" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" aria-label="LBD Nation seal">
          <circle cx="32" cy="32" r="30.5" stroke="#B8933E" stroke-width="1.2" fill="none"/>
          <circle cx="32" cy="32" r="25" stroke="#B8933E" stroke-width="0.6" opacity="0.6" fill="none"/>
          <defs>
            <clipPath id="logoClip">
              <circle cx="32" cy="32" r="21"/>
            </clipPath>
          </defs>
          <image
            href="bck.png"
            x="11"
            y="11"
            width="42"
            height="42"
            clip-path="url(#logoClip)"
            preserveAspectRatio="xMidYMid slice"
          />
        </svg>

        <div class="wordmark">
          <span class="eyebrow">Living by Design Nation</span>
          <span class="title">Jury Dashboard</span>
          <span class="subtitle">PERFORMANCE DATA</span>
          <span class="dashboard-welcome" id="dashboard-welcome"></span>
        </div>
      </div>
      <div class="dashboard-controls">
        <div class="dashboard-greeting" id="user-greeting">Loading...</div>
        <button id="theme-toggle" class="theme-toggle-btn" aria-label="Toggle Theme">🌓 Auto</button>
      </div>
    </div>

    <hr class="rule">
  </div>

  <div class="dashboard-content">

    <!-- LANDING: the three top-level actions -->
    <div class="dash-view" id="menu-view">
      <div class="menu-grid">
        <button type="button" class="menu-card" id="menu-create-rating">
          <div>
            <span class="menu-card-title">Create New Rating</span>
            <span class="menu-card-desc">Score an organ's Prehosting attendance, review, and SAM Goal follow-through.</span>
          </div>
          <span class="menu-card-arrow">→</span>
        </button>

        <button type="button" class="menu-card" id="menu-previous-ratings">
          <div>
            <span class="menu-card-title">All Organ Ratings</span>
            <span class="menu-card-desc">Browse ratings you've already submitted.</span>
          </div>
          <span class="menu-card-arrow">→</span>
        </button>

        <button type="button" class="menu-card" id="menu-organ-responses">
          <div>
            <span class="menu-card-title">Organ SAM Goal Responses</span>
            <span class="menu-card-desc">Review each organ's monthly SAM Goals form submissions.</span>
          </div>
          <span class="menu-card-arrow">→</span>
        </button>
      </div>
    </div>

    <!-- LEVEL 1: one card per organ -->
    <div class="dash-view is-hidden" id="organs-view">
      <button type="button" class="btn-back" id="back-to-menu">← Back to Dashboard</button>
      <div class="organ-grid" id="organ-grid">
        <div class="loader-wrap">
          <div class="loader">
            <div class="loader-logo-wrap"><img src="bck.png" alt="Loading..."></div>
          </div>
          <div class="loader-caption">Compiling secure data...</div>
        </div>
      </div>
    </div>

    <!-- LEVEL 2: that organ's submissions, identified by Organ_Option -->
    <div class="dash-view is-hidden" id="submissions-view">
      <button type="button" class="btn-back" id="back-to-organs">← Back to Organs</button>
      <h2 class="dash-view-title" id="submissions-organ-title"></h2>
      <div class="submissions-list" id="submissions-list"></div>
    </div>

    <!-- LEVEL 3: one submission's full Question/Answer list -->
    <div class="dash-view is-hidden" id="detail-view">
      <button type="button" class="btn-back" id="back-to-submissions">← Back to Submissions</button>
      <div class="detail-header" id="detail-header"></div>
      <div class="qa-list" id="qa-list"></div>
    </div>

    <div class="actions dashboard-logout-actions">
      <button type="button" class="btn btn-secondary" id="logout-btn">Secure Logout</button>
    </div>
  </div>
</div>

<script src="common.js"></script>
<script src="js-dashboard.js"></script>
</body>
</html>
